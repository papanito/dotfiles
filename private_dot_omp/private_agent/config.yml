providers:
  webSearch: gemini
symbolPreset: unicode
theme:
  dark: titanium
setupVersion: 1
# Startup Default
default_model: "google/gemini-2.5-flash"

# The Quadruple-Tier Failover Matrix (Gemini ──► Ollama Cloud ──► OpenRouter Free ──► Local Hardware)
fallbackModel:
  # Tier 1 Cloud Excursions fail over into Tier 2 Ollama Cloud
  "google/gemini-2.5-flash": "ollama/glm-5.2"
  "google/gemini-2.5-pro": "ollama/glm-5.2"

  # Tier 2 Ollama Cloud drops down into Tier 2.5 OpenRouter Free
  "ollama/glm-5.2": "openrouter/openai/gpt-oss-20b:free"
  "ollama/kimi-k2.7-code": "openrouter/openai/gpt-oss-20b:free"

  # Tier 2.5 OpenRouter Free drops down into Tier 3 local resources
  "openrouter/openai/gpt-oss-20b:free": "ollama/qwen3-coder:30b"
  "openrouter/cohere/north-mini-code:free": "llama.cpp/ggml-org/gemma-4-26B-A4B-it-GGUF:Q4_K_M"

# Subagent Task Assignments
modelRoles:
  default: "google/gemini-2.5-flash" # Standard code development pair-programming
  smol: "llama.cpp/ggml-org/gemma-4-26B-A4B-it-GGUF:Q4_K_M" # Syntax check subagents run entirely local for zero-cost
  slow: "google/gemini-2.5-pro" # Heavy contextual cross-package refactoring

agent:
  reasoning_effort: "high"
  interactive: true # Standard permission gate before executing local commands
  max_iterations: 12

code:
  style: "functional"
  include_comments: true
  framework_preferences:
    terraform: ">= 5.0"
    python: "3.11"
    go: "1.22"
    typescript: "bun" # Prefers lightweight runtimes for infrastructure scripts
personality: pragmatic
rules:
  autoConnectLsp: true
  trackModelConsumption: true
statusLine:
  preset: full
  sessionAccent: true
tui:
  textSizing: true
display:
  shimmer: classic
  smoothStreaming: true
  showTokenUsage: true
startup:
  checkUpdate: false
memory:
  backend: local
renderMermaid:
  enabled: false
github:
  enabled: true
hideThinkingBlock: true
autolearn:
  enabled: true
task:
  isolation:
    mode: auto
autoResume: true
autocompleteMaxVisible: 10
dev:
  autoqa: false

