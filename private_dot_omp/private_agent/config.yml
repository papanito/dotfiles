providers:
  webSearch: gemini
symbolPreset: unicode
theme:
  dark: titanium
setupVersion: 1
# Startup Default
default_model: "google/gemini-2.5-flash"

# The Triple-Tier Failover Matrix (Gemini Flash ──► Ollama Cloud ──► OpenRouter Free)
# NOTE: Gemini Pro excluded from routing — rate-limited on Google free tier. Available via manual switch only.
# NOTE: OpenRouter paid models (gpt-5.4) excluded from routing — available via manual switch only.
# NOTE: Local models (llama.cpp, local ollama) excluded from routing — available via manual switch only.
fallbackModel:
  # Tier 1 Gemini Flash fails over into Tier 2 Ollama Cloud
  "google/gemini-2.5-flash": "ollama/glm-5.2"

  # Tier 2 Ollama Cloud drops down into Tier 2.5 OpenRouter Free
  "ollama/glm-5.2": "openrouter/openai/gpt-oss-20b:free"
  "ollama/kimi-k2.7-code": "openrouter/openai/gpt-oss-20b:free"
  "ollama/deepseek-v4-pro": "openrouter/openai/gpt-oss-20b:free"
  "ollama/gemini-3-flash-preview": "openrouter/openai/gpt-oss-20b:free"
  "ollama/gpt-oss:20b": "openrouter/openai/gpt-oss-20b:free"
  "ollama/qwen3-coder-next": "openrouter/openai/gpt-oss-20b:free"

  # Tier 2.5 OpenRouter Free (final fallback — no local hardware in chain)
  "openrouter/openai/gpt-oss-20b:free": "openrouter/cohere/north-mini-code:free"
  "openrouter/cohere/north-mini-code:free": "ollama/gpt-oss:20b"

# Subagent Task Assignments (Budget-Optimized: all auto-routed models are free cloud)
modelRoles:
  default: "google/gemini-2.5-flash" # Interactive session — fast, capable, 1M context (Google free tier)
  smol: "ollama/gpt-oss:20b" # Quick mechanical subagents — free ollama-cloud, 131K ctx, reasoning
  slow: "ollama/deepseek-v4-pro" # Deep reasoning — free ollama-cloud, 524K ctx, 1M output
  vision: "ollama/gemini-3-flash-preview" # Image inputs — free ollama-cloud, 1M ctx, reasoning
  plan: "ollama/deepseek-v4-pro" # Architecture proposals — same as SLOW
  designer: "ollama/kimi-k2.7-code" # UI/UX specialist — free ollama-cloud, 262K ctx, image+reasoning
  commit: "openrouter/openai/gpt-oss-20b:free" # Commit message generation — free OpenRouter
  task: "google/gemini-2.5-flash" # General-purpose subagents — full capability needed
  advisor: "ollama/deepseek-v4-pro" # Oracle/consultation — senior engineer reasoning

agent:
  reasoning_effort: "high"
  interactive: true # Standard permission gate before executing local commands
  max_iterations: 12

code:
  style: "functional"
  include_comments: true
  framework_preferences:
    terraform: ">= 5.0"
    python: "3.11"
    go: "1.22"
    typescript: "bun" # Prefers lightweight runtimes for infrastructure scripts
personality: pragmatic
rules:
  autoConnectLsp: true
  trackModelConsumption: true
statusLine:
  preset: full
  sessionAccent: true
tui:
  textSizing: true
display:
  shimmer: classic
  smoothStreaming: true
  showTokenUsage: true
startup:
  checkUpdate: false
memory:
  backend: local
renderMermaid:
  enabled: false
github:
  enabled: true
hideThinkingBlock: true
autolearn:
  enabled: true
task:
  isolation:
    mode: auto
autoResume: true
autocompleteMaxVisible: 10
dev:
  autoqa: false

