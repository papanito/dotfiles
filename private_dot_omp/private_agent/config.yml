providers:
  webSearch: gemini
symbolPreset: unicode
theme:
  dark: titanium
setupVersion: 1
# Startup Default
default_model: "omniroute/free-forever"

# The Triple-Tier Failover Matrix (Gemini Flash ──► Ollama Cloud ──► OpenRouter Free)
# NOTE: Gemini Pro excluded from routing — rate-limited on Google free tier. Available via manual switch only.
# NOTE: OpenRouter paid models (gpt-5.4) excluded from routing — available via manual switch only.
# NOTE: Local models (llama.cpp, local ollama) excluded from routing — available via manual switch only.
fallbackModel:
  # OmniRoute free-forever fails over into OmniRoute best-free
  "omniroute/free-forever": "omniroute/auto/best-free"

  # OmniRoute best-free fails over into OpenRouter Free
  "omniroute/auto/best-free": "openrouter/openai/gpt-oss-20b:free"
  "omniroute/auto/coding:free": "omniroute/auto/best-free"
  "omniroute/auto/cheap": "omniroute/auto/best-free"

  # Tier 1 Gemini Flash fails over into Tier 2 Ollama Cloud
  "google/gemini-2.5-flash": "ollama/glm-5.2"

# Subagent Task Assignments (Budget-Optimized: all auto-routed models are free cloud)
modelRoles:
  default: "omniroute/free-forever" # Interactive session — free-forever omniroute start
  smol: "omniroute/auto/coding:free" # Quick mechanical subagents — free coding combo
  slow: "omniroute/auto/best-free" # Deep reasoning — best free combo
  vision: "omniroute/auto/best-free" # Image inputs — best free combo
  plan: "omniroute/auto/best-free" # Architecture proposals — best free combo
  designer: "omniroute/auto/best-free" # UI/UX specialist — best free combo
  commit: "omniroute/auto/cheap" # Commit message generation — cheapest free combo
  task: "omniroute/free-forever" # General-purpose subagents — free-forever start
  advisor: "omniroute/auto/best-free" # Oracle/consultation — best free combo

agent:
  reasoning_effort: "high"
  interactive: true # Standard permission gate before executing local commands
  max_iterations: 12

code:
  style: "functional"
  include_comments: true
  framework_preferences:
    terraform: ">= 5.0"
    python: "3.11"
    go: "1.22"
    typescript: "bun" # Prefers lightweight runtimes for infrastructure scripts
personality: pragmatic
rules:
  autoConnectLsp: true
  trackModelConsumption: true
statusLine:
  preset: full
  sessionAccent: true
tui:
  textSizing: true
display:
  shimmer: classic
  smoothStreaming: true
  showTokenUsage: true
startup:
  checkUpdate: false
memory:
  backend: local
renderMermaid:
  enabled: false
github:
  enabled: true
hideThinkingBlock: true
autolearn:
  enabled: true
task:
  isolation:
    mode: auto
autoResume: true
autocompleteMaxVisible: 10
dev:
  autoqa: false

