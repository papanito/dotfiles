providers:
  omniroute:
    baseUrl: "http://localhost:20128/v1"
    api: "openai-completions"
    apiKey: "OMNIROUTE_API_KEY"
    authHeader: true # OpenAI-compatible API uses Bearer header
    discovery:
      type: "openai-models-list"

  google:
    api: "google-generative-ai"
    apiKey: "GEMINI_API_KEY" # Read from system environment variables
    authHeader: false # Google Generative AI API uses ?key= query param, NOT Bearer headers

  openrouter:
    baseUrl: "https://openrouter.ai/api/v1"
    api: "openai-completions"
    apiKey: "OPENROUTER_API_KEY" # Read from system environment variables
    authHeader: true

